<style>

.b{padding:8px 18px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}.b1{background:var(--pr);color:#fff}.b1:hover{background:var(--pr-d)}.b2{background:#fff;color:var(--ink3);border:1.5px solid var(--line)}.bg{background:var(--g);color:#fff}.br{background:var(--r-bg);color:var(--r);border:1px solid #fecaca}.bx{background:#fff;border:2px solid var(--g);color:var(--g);font-weight:800}.bs{padding:6px 12px;font-size:11px}.b:disabled{opacity:.35;cursor:not-allowed}

.fg{margin-bottom:14px}.fg label{display:block;font-size:11px;font-weight:700;color:var(--ink4);margin-bottom:6px}.fi{width:100%;background:var(--line2);border:2px solid transparent;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--ink);outline:none}.fi:focus{border-color:var(--pr);background:#fff}.fi::placeholder{color:var(--ink6)}textarea.fi{resize:vertical;min-height:70px;line-height:1.7}
.login-bg{display:grid;place-items:center;min-height:100vh;background:linear-gradient(135deg,#f0f4ff,#e8eeff 30%,#f5f0ff 60%,#fef5ff)}.login-box{width:100%;max-width:400px;padding:0 20px;animation:up .5s}@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1}}.login-logo{text-align:center;margin-bottom:32px}.login-logo h2{font-size:22px;font-weight:800}.login-card{background:#fff;border-radius:18px;padding:32px 28px;box-shadow:0 10px 36px rgba(0,0,0,.08)}.btn-login{width:100%;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--pr),var(--acc));color:#fff;margin-top:6px}.btn-login:disabled{opacity:.4}.login-err{margin-top:8px;background:var(--r-bg);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--r);font-weight:600}.login-switch{text-align:center;margin-top:16px;font-size:12px;color:var(--ink5)}.login-switch a{color:var(--pr);font-weight:700;cursor:pointer}
.day-wrap{display:grid;place-items:center;min-height:calc(100vh - var(--topbar))}.day-grid{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}.day-c{background:#fff;border:2px solid var(--line);border-radius:18px;padding:36px 28px;width:260px;cursor:pointer;transition:.3s;text-align:center}.day-c:hover{border-color:var(--pr);transform:translateY(-4px)}.day-c.off{opacity:.3;pointer-events:none}.day-c h2{font-size:26px;font-weight:800;margin-bottom:5px}.day-c p{font-size:12px;color:var(--ink5)}.day-badge{display:inline-block;padding:4px 14px;border-radius:99px;font-size:10px;font-weight:700;margin-top:14px}.badge-on{background:var(--g-bg);color:#059669}.badge-off{background:var(--r-bg);color:var(--r)}

.peers{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:14px}.peer{padding:12px 14px;border:2px solid var(--line);border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:10px;background:#fff}.peer:hover{border-color:var(--pr-l);background:var(--pr-ll)}.peer.act{border-color:var(--pr);background:var(--pr-ll)}.peer.ok{border-color:var(--g);background:var(--g-bg)}.peer-av{width:32px;height:32px;border-radius:8px;background:var(--line);color:var(--ink5);display:grid;place-items:center;font-weight:800;font-size:12px;flex-shrink:0}.peer.act .peer-av{background:var(--pr);color:#fff}.peer.ok .peer-av{background:var(--g);color:#fff}.peer-nm{font-size:12px;font-weight:700}.peer-st{font-size:10px;color:var(--ink6)}
.atabs{display:flex;gap:2px;background:var(--line2);padding:3px;border-radius:12px;margin-bottom:20px;overflow-x:auto}.atab{flex-shrink:0;padding:8px 16px;border-radius:9px;border:none;background:transparent;font-size:11px;font-weight:700;cursor:pointer;color:var(--ink5);white-space:nowrap}.atab.on{background:#fff;color:var(--pr)}
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}.tbl th{background:var(--ink);color:rgba(255,255,255,.9);padding:10px 14px;text-align:left;font-size:10px;font-weight:700;white-space:nowrap}.tbl th:first-child{border-radius:8px 0 0 0}.tbl th:last-child{border-radius:0 8px 0 0}.tbl td{padding:10px 14px;border-bottom:1px solid var(--line2)}.tbl tr:hover td{background:var(--pr-ll)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}.sc{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center;position:relative;overflow:hidden}.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pr),var(--acc))}.sc .v{font-size:26px;font-weight:800}.sc .l{font-size:10px;color:var(--ink5);margin-top:5px;font-weight:600}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700}.badge::before{content:'';width:5px;height:5px;border-radius:50%}.badge-g{background:var(--g-bg);color:#059669}.badge-g::before{background:var(--g)}.badge-r{background:var(--r-bg);color:var(--r)}.badge-r::before{background:var(--r)}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(4px);display:grid;place-items:center;z-index:300}.modal{background:#fff;border-radius:18px;padding:28px;width:90%;max-width:480px;max-height:82vh;overflow-y:auto;box-shadow:0 10px 36px rgba(0,0,0,.08);animation:up .25s}.modal h2{font-size:16px;font-weight:800;margin-bottom:16px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:12px;font-weight:600;z-index:400;animation:up .25s;max-width:320px}.toast-s{border-left:4px solid var(--g)}.toast-e{border-left:4px solid var(--r)}
.prog{background:var(--line2);border-radius:99px;height:6px;overflow:hidden;margin-top:6px}.prog-bar{height:100%;background:linear-gradient(90deg,var(--pr),var(--acc));border-radius:99px}
.empty{text-align:center;padding:36px 16px;color:var(--ink6);font-size:12px}.spinner{width:22px;height:22px;border:2.5px solid var(--line);border-top-color:var(--pr);border-radius:50%;animation:spin .6s linear infinite;margin:36px auto}@keyframes spin{to{transform:rotate(360deg)}}
.upload-zone{border:2px dashed var(--pr-l);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;background:var(--pr-ll)}.upload-zone:hover{border-color:var(--pr)}.upload-icon{font-size:36px;margin-bottom:10px}.upload-title{font-size:14px;font-weight:700;margin-bottom:3px}.upload-desc{font-size:11px;color:var(--ink5)}.preview-wrap{max-height:320px;overflow:auto;border:1px solid var(--line);border-radius:10px;margin-top:14px}
.gap-bar{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:8px;margin-bottom:5px;background:#fff;border:1px solid var(--line);cursor:pointer}.gap-nm{font-size:12px;font-weight:700;width:70px;flex-shrink:0}.gap-track{flex:1;height:24px;background:var(--line2);border-radius:6px;overflow:hidden}.gap-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding:0 6px;font-size:10px;font-weight:700;color:#fff;min-width:24px}.gap-val{font-size:11px;font-weight:800;width:50px;text-align:right}
.grp-bar-wrap{margin-bottom:7px;cursor:pointer}.grp-bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}.grp-bar-label span:first-child{font-weight:700}.grp-bar-label span:last-child{font-weight:800;color:var(--pr)}.grp-track{height:20px;background:var(--line2);border-radius:6px;overflow:hidden}.grp-fill{height:100%;border-radius:6px}
.eval-trust{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;margin-bottom:5px;border:1px solid var(--line);cursor:pointer}.eval-trust-nm{font-size:12px;font-weight:700;width:70px;flex-shrink:0}.eval-trust-bar{flex:1;display:flex;gap:2px}.eval-trust-dot{width:7px;border-radius:3px}.eval-trust-stats{font-size:10px;color:var(--ink5);width:110px;text-align:right}
.ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.ins-section{margin-bottom:20px}.ins-section-title{font-size:15px;font-weight:800;margin-bottom:5px}.ins-section-desc{font-size:11px;color:var(--ink5);margin-bottom:12px}
@media(max-width:768px){.wrap{padding:14px}.card{padding:16px}.day-grid{flex-direction:column;align-items:center}.peers{grid-template-columns:1fr}.sg{grid-template-columns:1fr 1fr}.topbar{padding:0 14px}.ins-grid{grid-template-columns:1fr}}

<body>
<div id="root"></div>
<script type="text/babel">
const SB_URL='https://pmfrxiccvvsovofcgcly.supabase.co';const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtZnJ4aWNjdnZzb3ZvZmNnY2x5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MzQwMzQsImV4cCI6MjA5MDUxMDAzNH0._NUYL2RqyszKOn_xPQnS7qnhDW6JNFUN0g3TZtHZORc';const H={'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`};const HJ={...H,'Content-Type':'application/json','Prefer':'return=representation'};
async function Q(t,s='*',f='',o={}){let u=`${SB_URL}/rest/v1/${t}?select=${encodeURIComponent(s)}&limit=10000`;if(f)u+=`&${f}`;if(o.order)u+=`&order=${o.order}`;return(await fetch(u,{headers:H})).json();}
async function INS(t,b){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:HJ,body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function UPD(t,b,f){const r=await fetch(`${SB_URL}/rest/v1/${t}?${f}`,{method:'PATCH',headers:HJ,body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function DEL(t,f){const r=await fetch(`${SB_URL}/rest/v1/${t}?${f}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());}
async function RPC(fn,p){return(await fetch(`${SB_URL}/rest/v1/rpc/${fn}`,{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify(p)})).json();}
const{useState,useEffect,useMemo,useRef}=React;
function Toast({message,type,onClose}){useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);return<div className={`toast toast-${type==='success'?'s':'e'}`}>{message}</div>;}
function Login({onLogin}){const[eid,setEid]=useState('');const[nm,setNm]=useState('');const[err,setErr]=useState('');const[ld,setLd]=useState(false);const[mode,setMode]=useState('user');const[code,setCode]=useState('');const go=async e=>{e.preventDefault();if(mode==='admin'){if(code.trim()!=='peer2025'){setErr('인증코드가 올바르지 않습니다.');return;}setLd(true);setErr('');try{const a=await Q('users','*','is_admin=eq.true');if(!a.length){setErr('관리자 계정 없음');setLd(false);return;}onLogin(a[0]);}catch{setErr('서버 연결 실패');}setLd(false);return;}if(!eid.trim()||!nm.trim()){setErr('사번과 이름을 모두 입력해주세요.');return;}setLd(true);setErr('');try{const u=await Q('users','*',`employee_id=eq.${eid.trim()}&name=eq.${encodeURIComponent(nm.trim())}`);if(!u.length)setErr('등록되지 않은 사번이거나 이름이 일치하지 않습니다.');else if(u[0].is_admin)setErr('관리자는 관리자 로그인을 이용해주세요.');else onLogin(u[0]);}catch{setErr('서버 연결 실패.');}setLd(false);};return(<div className="login-bg"><div className="login-box"><div className="login-logo"><h2>대웅그룹 인턴십</h2><p style={{fontSize:13,marginTop:6,color:'var(--ink5)'}}>{mode==='admin'?'관리자':'Peer Evaluation'}</p></div><div className="login-card">{mode==='admin'?<form onSubmit={go}><div className="fg"><label>인증코드</label><input className="fi" type="password" value={code} onChange={e=>setCode(e.target.value)} style={{fontSize:16,letterSpacing:3,textAlign:'center'}}/></div>{err&&<div className="login-err">{err}</div>}<button className="btn-login" disabled={ld}>{ld?'...':'🔒 관리자 로그인'}</button></form>:<form onSubmit={go}><div className="fg"><label>사번</label><input className="fi" placeholder="사번" value={eid} onChange={e=>setEid(e.target.value)}/></div><div className="fg"><label>이름</label><input className="fi" placeholder="이름" value={nm} onChange={e=>setNm(e.target.value)}/></div>{err&&<div className="login-err">{err}</div>}<button className="btn-login" disabled={ld}>{ld?'...':'로그인'}</button></form>}<div className="login-switch">{mode==='user'?<span>관리자? <a onClick={()=>{setMode('admin');setErr('');}}>관리자 로그인 →</a></span>:<span><a onClick={()=>{setMode('user');setErr('');}}>← 일반 로그인</a></span>}</div></div></div></div>);}
function DaySel({settings,onPick,onResult}){return(<div className="day-wrap"><div style={{textAlign:'center'}}><h2 style={{fontSize:18,fontWeight:800,marginBottom:20}}>평가할 일차를 선택하세요</h2><div className="day-grid">{[1,2].map(d=>{const s=settings.find(x=>x.day_number===d);const on=s?.is_open;return<div key={d} className={`day-c ${on?'':'off'}`} onClick={()=>on&&onPick(d)}><h2>{d}일차</h2><p>{d===1?'일하는 방식 + 조별 과제 결과물':'워킹백워드 문서 평가'}</p><div className={`day-badge ${on?'badge-on':'badge-off'}`}>{on?'평가 진행중':'평가 마감'}</div></div>})}{settings.some(s=>s.result_open)&&<div style={{marginTop:24}}><button className="b b1" onClick={onResult}>📋 결과</button></div>}</div></div></div>);}
function ScoreIn({criteria,scores,onChange}){const defR={5:'탁월 — 뛰어난 수준',4:'우수 — 기대 이상',3:'보통 — 기본 충족',2:'부족 — 개선 필요',1:'매우 부족 — 크게 미달'};const parseR=desc=>{if(!desc)return{rubric:null,question:''};const lines=desc.replace(/\\n/g,'\n').split('\n').map(l=>l.trim()).filter(Boolean);const r={};const qLines=[];lines.forEach(line=>{const m=line.match(/^(\d)\s*[점:.:\-–—]+\s*(.+)/);if(m)r[parseInt(m[1])]=m[2].trim();else qLines.push(line);});return{rubric:Object.keys(r).length>=3?r:null,question:qLines.join(' ')};};return<div>{criteria.map(c=>{const{rubric,question}=parseR(c.item_description);const finalR=rubric||defR;return<div key={c.id} className="sc-item"><span className="sc-name">{c.item_order}. {c.item_name}</span>{question&&<div style={{fontSize:12,color:'var(--ink4)',lineHeight:1.6,marginBottom:10,padding:'8px 12px',background:'var(--pr-ll)',borderRadius:8,border:'1px solid var(--pr-l)'}}>{question}</div>}<div className="sc-rows">{[5,4,3,2,1].map(s=><div key={s} className={`sc-row ${scores[c.id]===s?'on':''}`} onClick={()=>onChange(c.id,s)}><div className="sc-row-num">{s}</div><div className="sc-row-txt">{finalR[s]||(s+'점')}</div></div>)}</div></div>})}</div>;}

function ADetail(){const[users,setUsers]=useState([]);const[sel,setSel]=useState(null);const[evals,setEvals]=useState([]);const[scores,setScores]=useState([]);const[criteria,setCriteria]=useState([]);const[feedback,setFeedback]=useState([]);const[allU,setAllU]=useState([]);const[ld,setLd]=useState(true);const[dLd,setDLd]=useState(false);const[dDay,setDDay]=useState(0);const[dQ,setDQ]=useState('');useEffect(()=>{(async()=>{setUsers(await Q('users','*','is_admin=eq.false',{order:'name'}));setAllU(await Q('users','*','is_admin=eq.false'));setCriteria(await Q('eval_criteria','*','',{order:'day_number,category,item_order'}));setLd(false);})();},[]);const loadD=async u=>{setSel(u);setDLd(true);setDDay(0);const[ev,sc,fb]=await Promise.all([Q('evaluations','*',`or=(evaluator_id.eq.${u.id},evaluatee_id.eq.${u.id})`,{order:'day_number,category'}),Q('evaluation_scores','*'),Q('evaluation_feedback','*')]);setEvals(ev);setScores(sc);setFeedback(fb);setDLd(false);};if(ld)return<div className="spinner"></div>;if(!sel){const fU=users.filter(u=>{if(!dQ.trim())return true;const s=dQ.toLowerCase();return u.name.toLowerCase().indexOf(s)>=0||u.employee_id.toLowerCase().indexOf(s)>=0||(u.department||'').toLowerCase().indexOf(s)>=0;});return<div><div className="card"><div className="card-t">🔎 인원 선택</div><input className="fi" placeholder="🔍 검색" value={dQ} onChange={e=>setDQ(e.target.value)} style={{marginBottom:12,padding:'7px 12px',fontSize:11}}/><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:6}}>{fU.map(u=><div key={u.id} className="peer" onClick={()=>loadD(u)}><div className="peer-av" style={{background:'var(--pr)',color:'#fff'}}>{u.name[0]}</div><div><div className="peer-nm">{u.name}</div><div className="peer-st">{u.department?u.department+' · ':''}{u.employee_id}</div></div></div>)}</div></div></div>;}if(dLd)return<div className="spinner"></div>;const df=e=>dDay===0||e.day_number===dDay;const rcv=evals.filter(e=>e.evaluatee_id===sel.id&&!e.is_self_eval&&df(e));const slf=evals.filter(e=>e.evaluatee_id===sel.id&&e.is_self_eval&&df(e));const gave=evals.filter(e=>e.evaluator_id===sel.id&&!e.is_self_eval&&df(e));const gS=id=>scores.filter(s=>s.evaluation_id===id);const gC=id=>criteria.find(c=>c.id===id);const gU=id=>allU.find(u=>u.id===id);const gF=id=>feedback.find(f=>f.evaluation_id===id);const rEv=(ev,who,col)=>{const sc=gS(ev.id);const fb=gF(ev.id);return<div key={ev.id} style={{marginBottom:8,padding:12,background:'var(--line2)',borderRadius:10}}><div style={{fontWeight:700,fontSize:12,marginBottom:6}}><span style={{color:col}}>{who}</span> <span style={{color:'var(--ink6)',fontSize:10}}>{ev.day_number}일차 · {ev.category}</span></div><div style={{display:'flex',flexWrap:'wrap',gap:4}}>{sc.map(s=>{const cr=gC(s.criteria_id);return<div key={s.id} style={{background:'#fff',border:'1px solid var(--line)',borderRadius:6,padding:'3px 7px',fontSize:11}}><span style={{color:'var(--ink5)'}}>{cr?.item_name||'?'}</span> <strong style={{color:'var(--pr)'}}>{s.score}</strong></div>})}</div>{fb&&<div style={{fontSize:11,marginTop:6}}>{fb.strengths&&<div><span style={{color:'var(--g)',fontWeight:700}}>잘한점:</span> {fb.strengths}</div>}{fb.improvements&&<div><span style={{color:'var(--r)',fontWeight:700}}>개선점:</span> {fb.improvements}</div>}</div>}</div>;};return<div><button className="b b2" onClick={()=>setSel(null)} style={{marginBottom:14}}>← 목록</button><div className="card" style={{marginBottom:14}}><div style={{display:'flex',alignItems:'center',gap:12}}><div className="target-av">{sel.name[0]}</div><div><h3 style={{fontSize:16,fontWeight:800}}>{sel.name}</h3><p style={{fontSize:12,color:'var(--ink5)'}}>{sel.department?sel.department+' · ':''}{sel.employee_id}</p></div></div></div><div className="tabs" style={{marginBottom:14}}>{[{v:0,l:'전체'},{v:1,l:'1일차'},{v:2,l:'2일차'}].map(t=><button key={t.v} className={`tab ${dDay===t.v?'on':''}`} onClick={()=>setDDay(t.v)}>{t.l}</button>)}</div>{slf.length>0&&<div className="card"><div className="card-t">📝 본인평가</div>{slf.map(ev=>rEv(ev,'본인','var(--pr)'))}</div>}<div className="card"><div className="card-t">📥 받은 평가 ({rcv.length}건)</div>{!rcv.length?<div className="empty">없음</div>:rcv.map(ev=>{const er=gU(ev.evaluator_id);return rEv(ev,er?.name||'?','var(--acc)')})}</div><div className="card"><div className="card-t">📤 평가한 내역 ({gave.length}건)</div>{!gave.length?<div className="empty">없음</div>:gave.map(ev=>{const ee=gU(ev.evaluatee_id);return rEv(ev,'→ '+(ee?.name||'?'),'var(--pr)')})}</div></div>;}
function AInsight(){const[ld,setLd]=useState(true);const[day,setDay]=useState(1);const[evals,setEvals]=useState([]);const[scores,setScores]=useState([]);const[users,setUsers]=useState([]);const[members,setMembers]=useState([]);const[groups,setGroups]=useState([]);useEffect(()=>{(async()=>{const[ev,sc,us,gm,gr]=await Promise.all([Q('evaluations','*'),Q('evaluation_scores','*'),Q('users','*','is_admin=eq.false'),Q('group_members','*, groups!inner(day_number, group_name)'),Q('groups','*','',{order:'day_number,group_name'})]);setEvals(ev);setScores(sc);setUsers(us);setMembers(gm);setGroups(gr);setLd(false);})();},[]);if(ld)return<div className="spinner"></div>;const de=evals.filter(e=>e.day_number===day);const dg=groups.filter(g=>g.day_number===day);const gapData=(()=>{const m={};de.forEach(ev=>{if(!ev.evaluatee_id)return;const ee=users.find(u=>u.id===ev.evaluatee_id);if(!ee)return;if(!m[ee.id])m[ee.id]={name:ee.name,eid:ee.employee_id,ss:[],ps:[]};const evS=scores.filter(s=>s.evaluation_id===ev.id);const a=evS.length?evS.reduce((t,s)=>t+s.score,0)/evS.length:0;if(ev.is_self_eval)m[ee.id].ss.push(a);else m[ee.id].ps.push(a);});return Object.values(m).filter(d=>d.ss.length&&d.ps.length).map(d=>{const sa=d.ss.reduce((a,b)=>a+b,0)/d.ss.length;const pa=d.ps.reduce((a,b)=>a+b,0)/d.ps.length;return{name:d.name,eid:d.eid,sa,pa,gap:sa-pa};}).sort((a,b)=>Math.abs(b.gap)-Math.abs(a.gap));})();const groupData=(()=>{return dg.map(g=>{const gm2=members.filter(m=>m.group_id===g.id);const mids=gm2.map(m=>m.user_id);let total=0,cnt=0;de.forEach(ev=>{if(ev.is_self_eval||ev.target_group_id||mids.indexOf(ev.evaluatee_id)===-1)return;scores.filter(s=>s.evaluation_id===ev.id).forEach(s=>{total+=s.score;cnt++;});});return{name:g.group_name,avg:cnt?total/cnt:0,cnt,mc:gm2.length};}).filter(g=>g.cnt>0).sort((a,b)=>b.avg-a.avg);})();const bc=v=>v>=4?'linear-gradient(90deg,#059669,#10b981)':v>=3?'linear-gradient(90deg,#3b82f6,#8b5cf6)':'linear-gradient(90deg,#f59e0b,#fbbf24)';return<div><div className="tabs" style={{marginBottom:16}}>{[1,2].map(d=><button key={d} className={`tab ${day===d?'on':''}`} onClick={()=>setDay(d)}>{d}일차</button>)}</div>{!de.length?<div className="card empty">데이터 없음</div>:<div><div style={{marginBottom:20}}><div className="card-t">🔍 본인 vs 동료 갭</div>{!gapData.length?<div className="card empty">부족</div>:<div className="card" style={{padding:'12px 14px'}}>{gapData.map(d=>{const ov=d.gap>0;return<div key={d.eid} className="gap-bar"><div className="gap-nm">{d.name}</div><div style={{flex:1}}><div style={{display:'flex',gap:4,alignItems:'center',marginBottom:2}}><div style={{fontSize:9,color:'var(--ink6)',width:22}}>본인</div><div className="gap-track"><div className="gap-fill" style={{width:(d.sa/5*100)+'%',background:'var(--pr)'}}>{d.sa.toFixed(1)}</div></div></div><div style={{display:'flex',gap:4,alignItems:'center'}}><div style={{fontSize:9,color:'var(--ink6)',width:22}}>동료</div><div className="gap-track"><div className="gap-fill" style={{width:(d.pa/5*100)+'%',background:'var(--acc)'}}>{d.pa.toFixed(1)}</div></div></div></div><div className="gap-val" style={{color:ov?'var(--r)':'var(--g)'}}>{ov?'+':''}{d.gap.toFixed(1)}</div></div>})}</div>}</div><div className="ins-grid"><div className="ins-section"><div className="ins-section-title">👥 조별 비교</div>{!groupData.length?<div className="card empty">부족</div>:<div className="card">{groupData.map(g=><div key={g.name} className="grp-bar-wrap"><div className="grp-bar-label"><span>{g.name} ({g.mc}명)</span><span>{g.avg.toFixed(1)}</span></div><div className="grp-track"><div className="grp-fill" style={{width:(g.avg/5*100)+'%',background:bc(g.avg)}}></div></div></div>)}</div>}</div><div className="ins-section"><div className="ins-section-title">🏢 부문별</div>{(()=>{const dm={};de.forEach(ev=>{if(ev.is_self_eval||!ev.evaluatee_id)return;const ee=users.find(u=>u.id===ev.evaluatee_id);if(!ee?.department)return;if(!dm[ee.department])dm[ee.department]={sc:[],n:new Set()};scores.filter(s=>s.evaluation_id===ev.id).forEach(s=>{dm[ee.department].sc.push(s.score)});dm[ee.department].n.add(ee.id);});const da=Object.entries(dm).map(([dept,d])=>{const avg=d.sc.reduce((a,b)=>a+b,0)/d.sc.length;const gr=avg>=4.5?'S':avg>=4?'A':avg>=3.5?'B+':avg>=3?'B':avg>=2.5?'C':'D';return{dept,avg,gr,n:d.n.size};}).sort((a,b)=>b.avg-a.avg);if(!da.length)return<div className="card empty">부족</div>;return<div className="card">{da.map(d=><div key={d.dept} className="grp-bar-wrap"><div className="grp-bar-label"><span>{d.dept} ({d.n}명)</span><span><span style={{background:d.gr==='S'?'#059669':d.gr==='A'?'#3b82f6':'#8b5cf6',color:'#fff',padding:'1px 5px',borderRadius:4,fontSize:9,fontWeight:800,marginRight:4}}>{d.gr}</span>{d.avg.toFixed(1)}</span></div><div className="grp-track"><div className="grp-fill" style={{width:(d.avg/5*100)+'%',background:bc(d.avg)}}></div></div></div>)}</div>;})()}</div></div></div>}</div>;}
function ACriteria({toast}){const[crit,setCrit]=useState([]);const[ld,setLd]=useState(true);const[day,setDay]=useState(1);const[editId,setEditId]=useState(null);const[editName,setEditName]=useState('');const[editDesc,setEditDesc]=useState('');const[editCat,setEditCat]=useState('');const load=async()=>{setCrit(await Q('eval_criteria','*','',{order:'day_number,category,item_order'}));setLd(false);};useEffect(()=>{load();},[]);const startEdit=c=>{setEditId(c.id);setEditName(c.item_name);setEditDesc(c.item_description||'');setEditCat(c.category);};const saveEdit=async()=>{if(!editName.trim())return;try{await UPD('eval_criteria',{item_name:editName.trim(),item_description:editDesc.trim(),category:editCat.trim()},`id=eq.${editId}`);toast('저장','success');setEditId(null);load();}catch{toast('실패','error');}};if(ld)return<div className="spinner"></div>;const dc=crit.filter(c=>c.day_number===day);const cats=[...new Set(dc.map(c=>c.category))];return<div><div className="tabs" style={{marginBottom:14}}>{[1,2].map(d=><button key={d} className={`tab ${day===d?'on':''}`} onClick={()=>setDay(d)}>{d}일차</button>)}</div><div className="card"><div className="card-t">평가항목 관리</div>{cats.map(cat=>{const items=dc.filter(c=>c.category===cat).sort((a,b)=>a.item_order-b.item_order);return<div key={cat} style={{marginBottom:18}}><div style={{fontWeight:800,fontSize:13,color:'var(--pr)',marginBottom:8,paddingBottom:4,borderBottom:'2px solid var(--pr-l)'}}>{cat}</div>{items.map(c=>{if(editId===c.id)return<div key={c.id} style={{padding:14,background:'var(--line2)',borderRadius:10,marginBottom:6,border:'1px solid var(--pr-l)'}}><div className="fg"><label>카테고리</label><input className="fi" value={editCat} onChange={e=>setEditCat(e.target.value)}/></div><div className="fg"><label>항목명</label><input className="fi" value={editName} onChange={e=>setEditName(e.target.value)}/></div><div className="fg"><label>평가기준</label><textarea className="fi" rows={5} value={editDesc} onChange={e=>setEditDesc(e.target.value)}/></div><div style={{display:'flex',gap:6,justifyContent:'flex-end'}}><button className="b b2" onClick={()=>setEditId(null)}>취소</button><button className="b b1" onClick={saveEdit}>저장</button></div></div>;return<div key={c.id} style={{padding:'8px 10px',background:'var(--line2)',borderRadius:8,marginBottom:4,cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}} onClick={()=>startEdit(c)}><span style={{fontWeight:700,fontSize:12}}>{c.item_order}. {c.item_name}</span><button className="b bs b2" onClick={e=>{e.stopPropagation();startEdit(c)}}>수정</button></div>})}</div>})}</div></div>;}
function MyResult({user,settings}){const[ld,setLd]=useState(true);const[evals,setEvals]=useState([]);const[scores,setScores]=useState([]);const[criteria,setCriteria]=useState([]);const[feedback,setFeedback]=useState([]);const[day,setDay]=useState(1);useEffect(()=>{(async()=>{const[ev,sc,cr,fb]=await Promise.all([Q('evaluations','*',`or=(evaluator_id.eq.${user.id},evaluatee_id.eq.${user.id})`),Q('evaluation_scores','*'),Q('eval_criteria','*','',{order:'day_number,category,item_order'}),Q('evaluation_feedback','*')]);setEvals(ev);setScores(sc);setCriteria(cr);setFeedback(fb);setLd(false);})();},[]);if(ld)return<div className="wrap"><div className="spinner"></div></div>;const ds=settings?.find(s=>s.day_number===day);const isOpen=ds?.result_open;const dayRcv=evals.filter(e=>e.evaluatee_id===user.id&&e.day_number===day&&!e.is_self_eval);const daySelf=evals.filter(e=>e.evaluatee_id===user.id&&e.day_number===day&&e.is_self_eval);const itemAvg={};const itemSelf={};dayRcv.forEach(ev=>{scores.filter(s=>s.evaluation_id===ev.id).forEach(s=>{const cr=criteria.find(c=>c.id===s.criteria_id);if(!cr)return;const k=`${ev.category}|${cr.item_name}`;if(!itemAvg[k])itemAvg[k]={cat:ev.category,item:cr.item_name,order:cr.item_order,sc:[],total:0};itemAvg[k].sc.push(s.score);itemAvg[k].total+=s.score;});});daySelf.forEach(ev=>{scores.filter(s=>s.evaluation_id===ev.id).forEach(s=>{const cr=criteria.find(c=>c.id===s.criteria_id);if(!cr)return;itemSelf[`${ev.category}|${cr.item_name}`]=s.score;});});const rcvFb=dayRcv.map(ev=>feedback.find(f=>f.evaluation_id===ev.id)).filter(Boolean).filter(f=>f.strengths||f.improvements);const cats=[...new Set(criteria.filter(c=>c.day_number===day).map(c=>c.category))];return<div className="wrap"><h2 style={{fontSize:18,fontWeight:800,marginBottom:14}}>📋 내 평가 결과</h2><div className="tabs" style={{marginBottom:14}}>{[1,2].map(d=>{const dS=settings?.find(ss=>ss.day_number===d);const dO=dS?.result_open;return<button key={d} className={`tab ${day===d?'on':''}`} onClick={()=>{if(dO)setDay(d)}} style={!dO?{opacity:.4,cursor:'not-allowed'}:{}}>{d}일차 {dO?'':'🔒'}</button>})}</div>{!isOpen?<div className="card empty"><div style={{fontSize:32}}>🔒</div><div style={{fontWeight:600,marginTop:6}}>미공개</div></div>:<div>{cats.map(cat=>{const items=Object.values(itemAvg).filter(x=>x.cat===cat).sort((a,b)=>a.order-b.order);if(!items.length)return null;return<div key={cat} className="card"><div className="card-t">{cat}</div><table className="tbl"><thead><tr><th>항목</th><th>동료평균</th><th>본인</th><th>갭</th><th>수</th></tr></thead><tbody>{items.map(it=>{const avg=it.total/it.sc.length;const sf=itemSelf[`${it.cat}|${it.item}`];const gap=sf!=null?sf-avg:null;return<tr key={it.item}><td style={{fontWeight:700}}>{it.item}</td><td><strong style={{color:'var(--pr)'}}>{avg.toFixed(1)}</strong></td><td style={{fontWeight:700}}>{sf!=null?sf:'-'}</td><td>{gap!=null?<span style={{fontWeight:700,color:gap>0?'var(--r)':gap<0?'var(--g)':'var(--ink6)'}}>{gap>0?'+':''}{gap.toFixed(1)}</span>:'-'}</td><td style={{color:'var(--ink5)'}}>{it.sc.length}</td></tr>})}</tbody></table></div>})}{rcvFb.length>0&&<div className="card"><div className="card-t">💬 동료 피드백 (익명)</div>{rcvFb.map((f,i)=><div key={i} style={{padding:'8px 10px',background:'var(--line2)',borderRadius:8,marginBottom:5}}>{f.strengths&&<div style={{fontSize:12}}><span style={{color:'var(--g)',fontWeight:700}}>잘한점:</span> {f.strengths}</div>}{f.improvements&&<div style={{fontSize:12}}><span style={{color:'var(--r)',fontWeight:700}}>개선점:</span> {f.improvements}</div>}</div>)}</div>}</div>}</div>;}
function App(){const[user,setUser]=useState(null);const[screen,setScreen]=useState('login');const[day,setDay]=useState(null);const[settings,setSettings]=useState([]);const[toast,setToast]=useState(null);const showToast=(m,t='success')=>setToast({message:m,type:t});const loadS=async()=>{try{setSettings(await Q('eval_settings','*'));}catch{}};useEffect(()=>{if(user)loadS();},[user]);const anyRO=settings.some(s=>s.result_open);if(screen==='login')return<><Login onLogin={u=>{setUser(u);setScreen(u.is_admin?'admin':'daySelect');}}/>{toast&&<Toast{...toast}onClose={()=>setToast(null)}/>}</>;return<div><div className="topbar"><h1><span style={{fontWeight:800}}>대웅그룹</span><span>Peer Evaluation</span></h1><div className="topbar-r"><span className="chip">{user.is_admin?'관리자':`${user.name} (${user.employee_id})`}</span>{!user.is_admin&&anyRO&&screen!=='result'&&<button className="topbar-btn" onClick={()=>setScreen('result')}>결과</button>}{user.is_admin&&screen!=='admin'&&<button className="topbar-btn" onClick={()=>setScreen('admin')}>관리자</button>}<button className="topbar-btn" onClick={()=>{setUser(null);setScreen('login');setDay(null);}}>로그아웃</button></div></div>{screen==='admin'&&<Admin user={user} toast={showToast}/>}{screen==='daySelect'&&<DaySel settings={settings} onPick={d=>{setDay(d);setScreen('eval');}} onResult={()=>setScreen('result')}/>}{screen==='result'&&<MyResult user={user} settings={settings}/>}{screen==='eval'&&<Eval user={user} day={day} onBack={()=>{setScreen('daySelect');setDay(null);loadS();}} toast={showToast}/>}{toast&&<Toast{...toast}onClose={()=>setToast(null)}/>}</div>;}
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
