function ATable({data,columns,actions,title,extra}){const[q,setQ]=useState('');const[sk,setSk]=useState('');const[sd,setSd]=useState('asc');const toggle=function(k){if(sk===k){setSd(sd==='asc'?'desc':'asc');}else{setSk(k);setSd('asc');}};var filtered=data.filter(function(r){if(!q.trim())return true;var s=q.trim().toLowerCase();return columns.some(function(c){var v=r[c.k];return v&&String(v).toLowerCase().includes(s);});});if(sk){filtered.sort(function(a,b){var va=a[sk]||'',vb=b[sk]||'';if(typeof va==='string')va=va.toLowerCase();if(typeof vb==='string')vb=vb.toLowerCase();if(va<vb)return sd==='asc'?-1:1;if(va>vb)return sd==='asc'?1:-1;return 0;});}return<div className="card"><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}><div className="card-t" style={{marginBottom:0}}>{title}</div><input className="fi" placeholder="🔍 검색 (사번, 이름, 소속)" value={q} onChange={function(e){setQ(e.target.value);}} style={{width:240,padding:'8px 14px',fontSize:12}}/></div>{extra&&<div style={{marginBottom:12}}>{extra}</div>}<table className="tbl"><thead><tr>{columns.map(function(c){return<th key={c.k} style={{cursor:'pointer',userSelect:'none'}} onClick={function(){toggle(c.k);}}>{c.l} {sk===c.k?(sd==='asc'?'▲':'▼'):''}</th>})}{actions&&<th></th>}</tr></thead><tbody>{filtered.map(function(r){return<tr key={r.id}>{columns.map(function(c){var v=r[c.k];return<td key={c.k} style={{fontFamily:c.mono?'monospace':'inherit',fontWeight:c.bold?700:'normal',color:c.dim?'var(--ink5)':'inherit',fontSize:c.dim?12:'inherit'}}>{c.render?c.render(v,r):(v||'-')}</td>})}{actions&&<td>{actions(r)}</td>}</tr>})}{!filtered.length&&<tr><td colSpan={columns.length+(actions?1:0)} style={{textAlign:'center',color:'var(--ink6)',padding:24}}>검색 결과 없음</td></tr>}</tbody></table></div>;}
function Login({onLogin}){const[eid,setEid]=useState('');const[nm,setNm]=useState('');const[err,setErr]=useState('');const[ld,setLd]=useState(false);const[mode,setMode]=useState('user');const[code,setCode]=useState('');const go=async e=>{e.preventDefault();if(mode==='admin'){if(code.trim()!=='peer2025'){setErr('인증코드가 올바르지 않습니다.');return;}setLd(true);setErr('');try{const a=await Q('users','*','is_admin=eq.true');if(!a.length){setErr('관리자 계정 없음');setLd(false);return;}onLogin(a[0]);}catch{setErr('서버 연결 실패');}setLd(false);return;}if(!eid.trim()||!nm.trim()){setErr('사번과 이름을 모두 입력해주세요.');return;}setLd(true);setErr('');try{const u=await Q('users','*',`employee_id=eq.${eid.trim()}&name=eq.${encodeURIComponent(nm.trim())}`);if(!u.length)setErr('등록되지 않은 사번이거나 이름이 일치하지 않습니다.');else if(u[0].is_admin)setErr('관리자는 관리자 로그인을 이용해주세요.');else onLogin(u[0]);}catch{setErr('서버 연결 실패.');}setLd(false);};return(<div className="login-bg"><div className="login-box"><div className="login-logo"><h2>대웅그룹 인턴십</h2><p style={{fontSize:14,marginTop:8,color:'var(--ink5)'}}>{mode==='admin'?'관리자 로그인':'Peer Evaluation'}</p></div><div className="login-card">{mode==='admin'?<div><div style={{background:'var(--acc-l)',borderRadius:12,padding:'12px 16px',marginBottom:20,fontSize:13,fontWeight:600,color:'#7c3aed',display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:22}}>🔒</span><div><div style={{fontWeight:800}}>관리자 전용</div><div style={{fontSize:11,opacity:.7,marginTop:2}}>인증코드를 입력하세요</div></div></div><form onSubmit={go}><div className="fg"><label>인증코드</label><input className="fi" type="password" placeholder="인증코드" value={code} onChange={e=>setCode(e.target.value)} style={{fontSize:18,letterSpacing:4,textAlign:'center',fontWeight:700}}/></div>{err&&<div className="login-err">{err}</div>}<button className="btn-login" disabled={ld} style={{background:'linear-gradient(135deg,#7c3aed,#6d28d9)'}}>{ld?'로그인 중...':'🔒 관리자 로그인'}</button></form></div>:<form onSubmit={go}><div className="fg"><label>사번</lab function DaySel({settings,onPick,onResult}){const anyRO=settings.some(function(s){return s.result_open});return(<div className="day-wrap"><div style={{textAlign:'center'}}><h2 style={{fontSize:18,fontWeight:800,marginBottom:20}}>평가할 일차를 선택하세요</h2><div className="day-grid">{[1,2].map(d=>{const s=settings.find(x=>x.day_number===d);const on=s?.is_open;return<div key={d} className={`day-c ${on?'':'off'}`} onClick={()=>on&&onPick(d)}><h2>{d}일차</h2><p>{d===1?'일하는 방식 + 조별 과제 결과물':'워킹백워드 문서 평가'}</p><div className={`day-badge ${on?'badge-on':'badge-off'}`}>{on?'평가 진행중':'평가 마감'}</div></div>})}</div>{anyRO&&<div style={{marginTop:32}}><button className="b b1" onClick={onResult} style={{padding:'14px 32px',fontSize:15,borderRadius:14,background:'linear-gradient(135deg,var(--pr),var(--acc))'}}>📋 내 평가 결과 확인하기</button></div>}</div></div>);}
function ScoreIn({criteria,scores,onChange}){var defaultR={5:'탁월 — 뛰어난 수준의 역량 발휘',4:'우수 — 기대 이상의 성과',3:'보통 — 기본적인 기대 충족',2:'부족 — 개선이 필요한 수준',1:'매우 부족 — 기대 수준에 크게 미달'};var parseR=function(desc){if(!desc)return null;var lines=desc.replace(/\\n/g,'\n').split('\n').map(function(l){return l.trim()}).filter(Boolean);var r={};lines.forEach(function(line){var m=line.match(/^(\d)\s*[점:.:\-–—]\s*(.+)/);if(m)r[parseInt(m[1])]=m[2].trim();});return Object.keys(r).length>=3?r:null;};return<div>{criteria.map(function(c){var rubric=parseR(c.item_description)||defaultR;var hasCustom=parseR(c.item_description);return<div key={c.id} className="sc-item"><span className="sc-name">{c.item_order}. {c.item_name}</span>{c.item_description&&!hasCustom&&<div style={{fontSize:12,color:'var(--ink5)',lineHeight:1.7,marginBottom:10,padding:'8px 12px',background:'var(--line2)',borderRadius:10,whiteSpace:'pre-line'}}>{c.item_description.replace(/\\n/g,'\n')}</div>}<div className="sc-rows">{[5,4,3,2,1].map(function(s){return<div key={s} className={'sc-row'+(scores[c.id]===s?' on':'')} onClick={function(){onChange(c.id,s)}}><div className="sc-row-num">{s}</div><div className="sc-row-txt">{rubric[s]||(s+'점')}</div></div>})}</div></div>})}</div>;}
function Eval({user,day,onBack,toast}){const[ld,setLd]=useState(true);const[crit,setCrit]=useState([]);const[cats,setCats]=useState([]);const[members,setMembers]=useState([]);const[curCat,setCurCat]=useState('');const[curTarget,setCurTarget]=useState(null);const[scores,setScores]=useState({});const[str,setStr]=useState('');const[imp,setImp]=useState('');const[subs,setSubs]=useState([]);const[submitting,setSubmitting]=useState(false);useEffect(()=>{load();},[day]);const load=async()=>{setLd(true);try{const cr=await Q('eval_criteria','*',`day_number=eq.${day}`,{order:'category,item_order'});setCrit(cr);const cs=[...new Set(cr.map(c=>c.category))];setCats(cs);if(cs.length)setCurCat(cs[0]);const me=await Q('group_members','*, groups!inner(day_number, group_name), users!inner(*)',`groups.day_number=eq.${day}&user_id=eq.${user.id}`);if(me.length){const all=await Q('group_members','*, users!inner(*)',`group_id=eq.${me[0].group_id}`);setMembers(all.map(m=>m.users));}const ev=await Q('evaluations','*',`day_number=eq.${day}&evaluator_id=eq.${user.id}`);setSubs(ev);}catch{toast('데이터 로드 실패','error');}setLd(false);};const done=(tid,cat)=>subs.some(e=>e.evaluatee_id===tid&&e.category===cat);const targets=useMemo(()=>{if(!curCat)return[];const self=members.find(m=>m.id===user.id);const peers=members.filter(m=>m.id!==user.id);return self?[self,...peers]:peers;},[members,curCat,user.id]);const curCrit=crit.filter(c=>c.category===curCat);const totalReq=cats.reduce((a,c)=>a+targets.length,0);const doneCount=subs.length;const submit=async()=>{if(curCrit.some(c=>!scores[c.id])){toast('모든 항목에 점수를 입력해주세요.','error');return;}setSubmitting(true);try{const isSelf=curTarget.id===user.id;const ev=await INS('evaluations',{day_number:day,evaluator_id:user.id,evaluatee_id:curTarget.id,is_self_eval:isSelf,category:curCat});await INS('evaluation_scores',curCrit.map(c=>({evaluation_id:ev[0].id,criteria_id:c.id,score:scores[c.id]})));if(day===2&&(str.trim()||imp.trim()))await INS('evaluation_feedback',{evaluation_id:ev[0].id,strengths:str.trim()||null,improvements:imp.trim()||null});toast(`${curTarget.name}님 평가 제출 완료`,'success');setScores({});setStr('');setImp('');setCurTarget(null);await load();}catch{toast('제출 실패. 이미 제출했는지 확인하세요.','error');}setSubmitting(false);};if(ld)return<div className="wrap"><div className="spinner"></div></div>;if(!members.length)return<div className="wrap"><div className="card empty"><p>조 배정 정보가 없습니다.</p><button className="b b2 bs" onClick={onBack} style={{marginTop:12}}>← 돌아가기</button></div></div>;return(<div className="wrap"><button className="b b2 bs" onClick={onBack} style={{marginBottom:14}}>← 일차 선택</button><div className="card" style={{marginBottom:14}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontWeight:800,fontSize:13}}>{day}일차 평가</span><span style={{fontSize:11,color:'var(--ink5)',fontWeight:600}}>{doneCount} / {totalReq} 완료</span></div><div className="prog"><div className="prog-bar" style={{width:`${totalReq?doneCount/totalReq*100:0}%`}}></div></div></div><div className="tabs">{cats.map(c=><button key={c} className={`tab ${curCat===c?'on':''}`} onClick={()=>{setCurCat(c);setCurTarget(null);setScores({});setStr('');setImp('');}}>{c}</button>)}</div><div className="card"><div className="card-t">평가 대상</div><div className="peers">{targets.map(t=>{const d=done(t.id,curCat);const a=curTarget?.id===t.id;const s=t.id===user.id;return<div key={t.id} className={`peer ${a?'act':''} ${d?'ok':''}`} onClick={()=>{if(!d){setCurTarget(t);setScores({});setStr('');setImp('');}}}>  <div className="peer-av">{t.name[0]}</div><div><div className="peer-nm">{t.name}{s?' (본인)':''}</div><div className="peer-st">{d?'✓ 완료':'미제출'}</div></div></div>})}</div></div>{curTarget&&!done(curTarget.id,curCat)&&<div className="card"><div className="target"><div className="target-av">{curTarget.name[0]}</div><div><h3>{curTarget.name}{curTarget.id===user.id?' (본인평가)':''}</h3><p>{curCat} 평가</p></div></div><ScoreIn criteria={curCrit} scores={scores} onChange={(id,s)=>setScores(p=>({...p,[id]:s}))}/>{day===2&&<div style={{marginTop:16}}><div className="fg"><label>잘한 점</label><textarea className="fi" placeholder="잘한 점을 작성해주세요..." value={str} onChange={e=>setStr(e.target.value)}/></div><div className="fg"><label>개선할 점</label><textarea className="fi" placeholder="개선할 점을 작성해주세요..." value={imp} onChange={e=>setImp(e.target.value)}/></div></div>}<div style={{display:'flex',justifyContent:'flex-end',gap:6,marginTop:16}}><button className="b b2" onClick={()=>{setCurTarget(null);setScores({});}}>취소</button><button className="b b1" onClick={submit} disabled={submitting}>{submitting?'제출 중...':'평가 제출'}</button></div></div>}</div>);}
function Admin({user,toast}){const[tab,setTab]=useState('settings');const[settings,setSettings]=useState([]);const[ld,setLd]=useState(true);useEffect(()=>{(async()=>{setSettings(await Q('eval_settings','*'));setLd(false);})();},[]);const toggle=async(d,cur)=>{try{await UPD('eval_settings',{is_open:!cur,...(cur?{closed_at:new Date().toISOString()}:{opened_at:new Date().toISOString()})},`day_number=eq.${d}`);toast(`${d}일차 ${cur?'마감':'오픈'} 완료`,'success');setSettings(await Q('eval_settings','*'));}catch{toast('설정 변경 실패','error');}};const toggleResult=async(dn,cur)=>{try{await UPD('eval_settings',{result_open:!cur},`day_number=eq.${dn}`).catch(()=>{});setSettings(await Q('eval_settings','*'));toast(dn+'일차 결과 '+(!cur?'공개':'비공개')+' 완료','success');}catch{toast('설정 변경 실패','error');}};const tabs=[{id:'settings',l:'⚙️ 평가 설정'},{id:'criteria',l:'📝 평가항목'},{id:'upload',l:'📤 엑셀 업로드'},{id:'groups',l:'👥 조 편성'},{id:'users',l:'🧑 인원 관리'},{id:'status',l:'📋 제출 현황'},{id:'scores',l:'📊 점수 집계'},{id:'detail',l:'🔎 개인별 상세'},{id:'insight',l:'💡 인사이트'},{id:'feedback',l:'💬 서술형 피드백'},{id:'export',l:'📥 엑셀 추출'}];return(<div className="wrap"><div className="atabs">{tabs.map(t=><button key={t.id} className={`atab ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}</div>{tab==='settings'&&<ASet settings={settings} onToggle={toggle} onResultToggle={toggleResult}/>}{tab==='criteria'&&<ACriteria toast={toast}/>}{tab==='upload'&&<AUpload toast={toast}/>}{tab==='groups'&&<AGrp toast={toast}/>}{tab==='users'&&<AUsr toast={toast}/>}{tab==='status'&&<AStat toast={toast}/>}{tab==='scores'&&<AScr/>}{tab==='detail'&&<ADetail/>}{tab==='insight'&&<AInsight/>}{tab==='feedback'&&<AFb/>}{tab==='export'&&<AExp toast={toast}/>}</div>);}
function ASet({settings,onToggle,onResultToggle}){return<div><div className="card"><div className="card-t">평가 오픈/마감</div>{settings.map(s=><div key={s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 0',borderBottom:'1px solid var(--line2)'}}><div><div style={{fontWeight:800,fontSize:14}}>{s.day_number}일차</div><div style={{fontSize:11,color:'var(--ink6)',marginTop:2}}>{s.opened_at?`오픈: ${new Date(s.opened_at).toLocaleString('ko-KR')}`:''}{s.closed_at?` · 마감: ${new Date(s.closed_at).toLocaleString('ko-KR')}`:''}</div></div><div style={{display:'flex',alignItems:'center',gap:10}}><span className={`badge ${s.is_open?'badge-g':'badge-r'}`}>{s.is_open?'진행중':'마감'}</span><button className={`b bs ${s.is_open?'br':'bg'}`} onClick={()=>onToggle(s.day_number,s.is_open)}>{s.is_open?'마감하기':'오픈하기'}</button></div></div>)}</div><div className="card"><div className="card-t">📋 평가 결과 공개</div><p style={{fontSize:13,color:'var(--ink5)',lineHeight:1.7,marginBottom:14}}>결과를 오픈하면 평가자가 본인이 받은 평가 결과를 확인할 수 있습니다. 일차별 독립 운영.</p>{settings.map(s=><div key={'r'+s.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 0',borderBottom:'1px solid var(--line2)'}}><div style={{fontWeight:700,fontSize:14}}>{s.day_number}일차 결과</div><div style={{display:'flex',alignItems:'center',gap:10}}><span className={`badge ${s.result_open?'badge-g':'badge-r'}`}>{s.result_open?'공개중':'비공개'}</span><button className={`b bs ${s.result_open?'br':'bg'}`} onClick={()=>onResultToggle(s.day_number,s.result_open)}>{s.result_open?'비공개로':'결과 오픈'}</button></div></div>)}</div></div>;}
function AGrp({toast}){const[groups,setGroups]=useState([]);const[users,setUsers]=useState([]);const[members,setMembers]=useState([]);const[day,setDay]=useState(1);const[show,setShow]=useState(false);const[gn,setGn]=useState('');const[showM,setShowM]=useState(null);const[ld,setLd]=useState(true);useEffect(()=>{loadAll();},[]);const loadAll=async()=>{setLd(true);const[g,u,m]=await Promise.all([Q('groups','*','',{order:'day_number,group_name'}),Q('users','*','is_admin=eq.false',{order:'name'}),Q('group_members','*, users!inner(name, employee_id), groups!inner(day_number, group_name)')]);setGroups(g);setUsers(u);setMembers(m);setLd(false);};const addG=async()=>{if(!gn.trim())return;try{await INS('groups',{day_number:day,group_name:gn.trim()});toast('조 생성','success');setGn('');setShow(false);loadAll();}catch{toast('실패','error');}};const delG=async id=>{if(!confirm('삭제?'))return;try{await DEL('groups',`id=eq.${id}`);toast('삭제','success');loadAll();}catch{toast('실패','error');}};const addM=async(gid,uid)=>{try{await INS('group_members',{group_id:gid,user_id:uid});toast('추가','success');loadAll();}catch{toast('실패','error');}};const delM=async id=>{try{await DEL('group_members',`id=eq.${id}`);toast('제거','success');loadAll();}catch{toast('실패','error');}};if(ld)return<div className="spinner"></div>;const dg=groups.filter(g=>g.day_number===day);return<div><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><div className="tabs" style={{marginBottom:0}}>{[1,2].map(d=><button key={d} className={`tab ${day===d?'on':''}`} onClick={()=>setDay(d)}>{d}일차</button>)}</div><button className="b b1 bs" onClick={()=>setShow(true)}>+ 조 추가</button></div>{!dg.length?<div className="card empty">조가 없습니다.</div>:dg.map(g=>{const gm=members.filter(m=>m.group_id===g.id);return<div key={g.id} className="card"><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}><div className="card-t" style={{marginBottom:0}}>{g.g function AFb(){const[fb,setFb]=useState([]);const[ld,setLd]=useState(true);useEffect(()=>{(async()=>{const d=await Q('v_feedback_summary','*','',{order:'evaluatee_name,submitted_at.desc'});setFb(Array.isArray(d)?d:[]);setLd(false);})();},[]);if(ld)return<div className="spinner"></div>;if(!fb.length)return<div className="card empty">서술형 피드백 없음</div>;const g={};fb.forEach(f=>{if(!g[f.evaluatee_id])g[f.evaluatee_id]={name:f.evaluatee_name,eid:f.evaluatee_employee_id,items:[]};g[f.evaluatee_id].items.push(f);});return<div>{Object.entries(g).map(([id,d])=><div key={id} className="card"><div className="card-t">{d.name} ({d.eid})</div>{d.items.map((f,i)=><div key={i} style={{padding:'10px 0',borderBottom:'1px solid var(--line2)'}}><div style={{fontSize:11,color:'var(--ink6)',marginBottom:4}}>{f.is_self_eval?'본인':f.evaluator_name} · {f.category}</div>{f.strengths&&<div style={{fontSize:12,marginBottom:3}}><span style={{color:'var(--g)',fontWeight:700}}>잘한 점:</span> {f.strengths}</div>}{f.improvements&&<div style={{fontSize:12}}><span style={{color:'var(--r)',fontWeight:700}}>개선할 점:</span> {f.improvements}</div>}</div>)}</div>)}</div>;}
function AExp({toast}){const[ld,setLd]=useState(false);const go=async()=>{setLd(true);toast('데이터 수집 중...','success');try{const[evals,scores,criteria,users,feedback]=await Promise.all([Q('evaluations','*'),Q('evaluation_scores','*'),Q('eval_criteria','*'),Q('users','*','is_admin=eq.false'),Q('evaluation_feedback','*')]);const raw=[];for(const ev of evals){const er=users.find(u=>u.id===ev.evaluator_id);const ee=users.find(u=>u.id===ev.evaluatee_id);for(const sc of scores.filter(s=>s.evaluation_id===ev.id)){const cr=criteria.find(c=>c.id===sc.criteria_id);raw.push({'일차':ev.day_number,'카테고리':ev.category,'평가자_사번':er?.employee_id||'','평가자_이름':er?.name||'','피평가자_사번':ee?.employee_id||'','피평가자_이름':ee?.name||'','본인평가':ev.is_self_eval?'Y':'N','평가항목':cr?.item_name||'','점수':sc.score,'제출일시':ev.submitted_at});}}const sm={};for(const ev of evals){const ee=users.find(u=>u.id===ev.evaluatee_id);for(const sc of scores.filter(s=>s.evaluation_id===ev.id)){const cr=criteria.find(c=>c.id===sc.criteria_id);const k=`${ev.day_number}|${ev.category}|${ee?.employee_id}|${cr?.item_name}`;if(!sm[k])sm[k]={day:ev.day_number,cat:ev.category,eid:ee?.employee_id,name:ee?.name,item:cr?.item_name,self:null,peers:[]};if(ev.is_self_eval)sm[k].self=sc.score;else sm[k].peers.push(sc.score);}}const sumR=Object.values(sm).map(s=>{const pa=s.peers.length?s.peers.reduce((a,b)=>a+b,0)/s.peers.length:null;return{'일차':s.day,'카테고리':s.cat,'사번':s.eid,'이름':s.name,'항목':s.item,'본인점수':s.self,'동료평균':pa?pa.toFixed(2):'','동료평균x5':pa?(pa*5).toFixed(2):'','동료수':s.peers.length};});const fbR=[];for(const ev of evals){const f=feedback.find(x=>x.evaluation_id===ev.id);if(f&&(f.strengths||f.improvements)){const er=users.find(u=>u.id===ev.evaluator_id);const ee=users.find(u=>u.id===ev.evaluatee_id);fbR.push({'일차':ev.day_number,'카테고리':ev.category,'평가자':er?.name||'','피평가자':ee?.name||'','본인':ev.is_self_eval?'Y':'N','잘한점':f.strengths||'','개선할점':f.improvements||''});}}const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(raw),'평가원본');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(sumR),'항목별집계');if(fbR.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(fbR),'서술형피드백');XLSX.writeFile(wb,`피어평가_${new Date().toISOString().slice(0,10)}.xlsx`);toast('엑셀 다운로드 완료','success');}catch(e){console.error(e);toast('엑셀 생성 실패','error');}setLd(false);};return<div className="card" style={{textAlign:'center',padding:'48px 24px'}}><div style={{fontSize:40,marginBottom:16}}>📊</div><h3 style={{fontSize:16,fontWeight:800,marginBottom:8}}>평가 결과 엑셀 추출</h3><p style={{fontSize:13,color:'var(--ink5)',marginBottom:24,lineHeight:1.7}}>모든 인원의 본인평가·상호평가 점수와<br/>서술형 피드백을 엑셀 파일로 다운로드합니다.</p><div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center',marginBottom:20}}><span className="badge badge-g">Sheet 1: 평가 원본</span><span className="badge badge-g">Sheet 2: 항목별 집계</span><span className="badge badge-g">Sheet 3: 서술형 피드백</span></div><button className="b bx" style={{padding:'12px 32px',fontSize:14}} onClick={go} disabled={ld}>{ld?'생성 중...':'📥 엑셀 다운로드'}</button></div>;}
function ACriteria({toast}){const[crit,setCrit]=useState([]);const[ld,setLd]=useState(true);const[day,setDay]=useState(1);const[editId,setEditId]=useState(null);const[editName,setEditName]=useState('');const[editDesc,setEditDesc]=useState('');const[editCat,setEditCat]=useState('');const load=async()=>{setCrit(await Q('eval_criteria','*','',{order:'day_number,category,item_order'}));setLd(false);};useEffect(()=>{load();},[]);const startEdit=function(c){setEditId(c.id);setEditName(c.item_name);setEditDesc((c.item_description||'').replace(/\\n/g,'\n'));setEditCat(c.category);};const saveEdit=async()=>{if(!editName.trim())return;try{await UPD('eval_criteria',{item_name:editName.trim(),item_description:editDesc.trim(),category:editCat.trim()},`id=eq.${editId}`);toast('저장 완료','success');setEditId(null);load();}catch{toast('저장 실패','error');}};if(ld)return<div className="spinner"></div>;var dc=crit.filter(function(c){return c.day_number===day});var cats=[...new Set(dc.map(function(c){return c.category}))];return<div><div className="tabs" style={{marginBottom:16}}>{[1,2].map(d=><button key={d} className={`tab ${day===d?'on':''}`} onClick={()=>setDay(d)}>{d}일차</button>)}</div><div className="card"><div className="card-t">📝 평가항목 관리</div><p style={{fontSize:12,color:'var(--ink5)',marginBottom:16,lineHeight:1.7}}>각 항목의 이름과 평가기준(문항 내용)을 수정할 수 있습니다.<br/>점수별 기준은 <strong>5점: 내용\n4점: 내용\n3점: 내용...</strong> 형식으로 작성하면 평가자에게 점수별로 분리 표시됩니다.</p>{cats.map(function(cat){var items=dc.filter(function(c){return c.category===cat}).sort(function(a,b){return a.item_order-b.item_order});return<div key={cat} style={{marginBottom:24}}><div style={{fontWeight:800,fontSize:14,color:'var(--pr)',marginBottom:10,paddingBottom:6,borderBottom:'2px solid var(--pr-l)'}}>{cat}</div>{items.map(function(c){var isEditing=editId===c.id;if(isEditing)return<div key={c.id} style={{padding:16,background:'var(--pr-ll)',borderRadius:12,marginBottom:8,border:'2px solid var(--pr-l)'}}><div className="fg"><label>카테고리</label><input className="fi" value={editCat} onChange={function(e){setEditCat(e.target.value)}}/></div><div className="fg"><label>항목명</label><input className="fi" value={editName} onChange={function(e){setEditName(e.target.value)}}/></div><div className="fg"><label>평가기준 (점수별 기준: "5점: 내용" 줄바꿈으로 구분)</label><textarea className="fi" rows={6} value={editDesc} onChange={function(e){setEditDesc(e.target.value)}} placeholder={"5점: 전 과정에 적극 참여하며 논의와 실행을 주도함\n4점: 대부분 참여하며 맡은 역할을 충실히 수행함\n3점: 기본적인 참여는 하나 주도성은 부족함\n2점: 참여가 제한적이며 소극적인 태도를 보임\n1점: 참여가 거의 없어 팀 활동에 기여하지 못함"}/></div><div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><button className="b b2" onClick={()=>setEditId(null)}>취소</button><button className="b b1" onClick={saveEdit}>💾 저장</button></div></div>;return<div key={c.id} style={{padding:'12px 14px',background:'var(--line2)',borderRadius:10,marginBottom:6,cursor:'pointer'}} onClick={function(){startEdit(c)}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><span style={{fontWeight:800,fontSize:14}}>{c.item_order}. {c.item_name}</span></div><button className="b bs b2" onClick={function(e){e.stopPropagation();startEdit(c);}}>✏️ 수정</button></div>{c.item_description&&<div style={{fontSize:11,color:'var(--ink5)',marginTop:6,lineHeight:1.6,whiteSpace:'pre-line'}}>{c.item_description.replace(/\\n/g,'\n').substring(0,120)}{c.item_description.length>120?'...':''}</div>}</div>})}</div>})}</div></div>;}
function AUpload({toast}){const[file,setFile]=useState(null);const[preview,setPreview]=useState([]);const[uploading,setUploading]=useState(false);const[result,setResult]=useState(null);const fileRef=useRef();const parseFile=function(f){setFile(f);setResult(null);const reader=new FileReader();reader.onload=function(evt){try{const wb=XLSX.read(evt.target.result,{type:'array'});var ws=wb.Sheets['조 구성']||wb.Sheets[wb.SheetNames[0]];const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});var hi=-1;for(var i=0;i<Math.min(10,data.length);i++){var row=data[i].map(c=>String(c).trim());if(row.includes('사번')&&row.includes('이름')){hi=i;break;}}if(hi===-1){setPreview(data.slice(3).filter(r=>r[3]&&r[4]).map(r=>({eid:String(r[3]).trim(),nm:String(r[4]).trim(),dept:String(r[7]||'').trim(),d1:String(r[10]||'').trim(),d2:String(r[11]||'').trim()})));}else{var hd=data[hi].map(c=>String(c).trim());var ec=hd.indexOf('사번'),nc=hd.indexOf('이름'),dc=hd.findIndex(h=>h.includes('OJT 소속'))>=0?hd.findIndex(h=>h.includes('OJT 소속')):hd.findIndex(h=>h.includes('소속')),c1=hd.findIndex(h=>h.includes('1일차')),c2=hd.findIndex(h=>h.includes('2일차'));setPreview(data.slice(hi+1).filter(r=>r[ec]&&r[nc]).map(r=>({eid:String(r[ec]).trim(),nm:String(r[nc]).trim(),dept:dc>=0?String(r[dc]||'').trim():'',d1:c1>=0?String(r[c1]||'').trim():'',d2:c2>=0?String(r[c2]||'').trim():''})));}}catch(e){console.error(e);toast('엑셀 파싱 실패','error');}};reader.readAsArrayBuffer(f);};const upload=async()=>{if(!preview.length)return;setUploading(true);setResult(null);var uOk=0,uF=0,gOk=0,gF=0;try{for(var p of preview){try{await INS('users',{employee_id:p.eid,name:p.nm,department:p.dept||null});uOk++;}catch{uF++;}}var allU=await Q('users','*','is_admin=eq.false');var um={};allU.forEach(u=>{um[u.employee_id]=u.id;});var eg=await Q('groups','*');var gm={};eg.forEach(g=>{gm[g.day_number+'-'+g.group_name]=g.id;});for(var pi2=0;pi2<preview.length;pi2++){var p2=preview[pi2];var uid=um[p2.eid];if(!uid)continue;var pairs=[[1,p2.d1],[2,p2.d2]];for(var pi=0;pi<pairs.length;pi++){var dn=pairs[pi][0],gn=pairs[pi][1];if(!gn)continue;var gnm=gn+'조',key=dn+'-'+gnm;if(!gm[key]){try{var ng=await INS('groups',{day_number:dn,group_name:gnm});gm[key]=ng[0].id;}catch(ex){var xg=await Q('groups','*','day_number=eq.'+dn+'&group_name=eq.'+encodeURIComponent(gnm));if(xg.length)gm[key]=xg[0].id;}}if(gm[key]){try{await INS('group_members',{group_id:gm[key],user_id:uid});gOk++;}catch(ex2){gF++;}}}}setResult({uOk:uOk,uF:uF,gOk:gOk,gF:gF});toast('완료! '+uOk+'명, 조배정 '+gOk+'건','success');}catch(e){console.error(e);toast('오류','error');}setUploading(false);};return<div><div className="card"><div className="card-t">엑셀 대량 업로드</div><p style={{fontSize:13,color:'var(--ink5)',lineHeight:1.7,marginBottom:18}}>사번(D열), 이름(E열), 소속(H열), 1일차조(K열), 2일차조(L열) 자동 읽기</p><div className="upload-zone" onClick={()=>fileRef.current&&fileRef.current.click()}><div className="upload-icon">📁</div><div className="upload-title">{file?file.name:'엑셀 파일을 클릭하여 선택'}</div><div className="upload-desc">.xlsx 파일</div></div><input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={e=>{if(e.target.files[0])parseFile(e.target.files[0]);}}/></div>{preview.length>0&&<div className="card"><div className="card-t">미리보기 ({preview.length}명)</div><div className="preview-wrap"><table className="tbl"><thead><tr><th>#</th><th>사번</th><th>이름</th><th>소속</th><th>1일차</th><th>2일차</th></tr></thead><tbody>{preview.slice(0,50).map((p,i)=><tr key={i}><td>{i+1}</td><td style={{fontFamily:'monospace'}}>{p.eid}</td><td style={{fontWeight:700}}>{p.nm}</td><td style={{color:'var(--ink5)'}}>{p.dept||'-'}</td><td><span className="badge badge-g">{p.d1||'-'}조</span></td><td><span className="badge badge-g">{p.d2||'-'}조</span></td></tr>)}</tbody></table></div><div style={{display:'flex',justifyContent:'space-between',marginTop:18}}><button className="b b2" onClick={()=>{setFile(null);setPreview([]);setResult(null);}}>초기화</button><button className="b b1" onClick={upload} disabled={uploading}>{uploading?'업로드 중...':'🚀 일괄 업로드'}</button></div></div>}{result&&<div className="card" style={{background:'var(--g-bg)'}}><div className="card-t" style={{color:'#059669'}}>업로드 결과</div><div className="sg"><div className="sc"><div className="v" style={{color:'var(--g)'}}>{result.uOk}</div><div className="l">인원 등록</div></div><div className="sc"><div className="v">{result.uF}</div><div className="l">스킵(중복)</div></div><div className="sc"><div className="v" style={{color:'var(--g)'}}>{result.gOk}</div><div className="l">조 배정</div></div><div className="sc"><div className="v">{result.gF}</div><div className="l">배정 스킵</div></div></div></div>}</div>;}
function ADetail(){const[users,setUsers]=useState([]);const[sel,setSel]=useState(null);const[evals,setEvals]=useState([]);const[scores,setScores]=useState([]);const[criteria,setCriteria]=useState([]);const[feedback,setFeedback]=useState([]);const[allUsers,setAllUsers]=useState([]);const[ld,setLd]=useState(true);const[dLd,setDLd]=useState(false);const[dDay,setDDay]=useState(0);const[detailQ,setDetailQ]=useState('');useEffect(()=>{(async()=>{setUsers(await Q('users','*','is_admin=eq.false',{order:'name'}));setAllUsers(await Q('users','*','is_admin=eq.false'));setCriteria(await Q('eval_criteria','*','',{order:'day_number,category,item_order'}));setLd(false);})();},[]);const loadD=async u=>{setSel(u);setDLd(true);setDDay(0);const[ev,sc,fb]=await Promise.all([Q('evaluations','*',`or=(evaluator_id.eq.${u.id},evaluatee_id.eq.${u.id})`,{order:'day_number,category'}),Q('evaluation_scores','*'),Q('evaluation_feedback','*')]);setEvals(ev);setScores(sc);setFeedback(fb);setDLd(false);};if(ld)return<div className="spinner"></div>;if(!sel){var fUsers=users.filter(function(u){if(!detailQ.trim())return true;var s=detailQ.toLowerCase();return u.name.toLowerCase().includes(s)||u.employee_id.toLowerCase().includes(s)||(u.department||'').toLowerCase().includes(s);});return<div><div className="card"><div className="card-t">🔎 인원을 선택하세요</div><input className="fi" placeholder="🔍 검색 (사번, 이름, 소속)" value={detailQ} onChange={function(e){setDetailQ(e.target.value);}} style={{marginBottom:14,padding:'8px 14px',fontSize:12}}/><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:8}}>{fUsers.map(u=><div key={u.id} className="peer" onClick={()=>loadD(u)}><div className="peer-av" style={{background:'var(--pr)',color:'#fff'}}>{u.name[0]}</div><div><div className="peer-nm">{u.name}</div><div className="peer-st">{u.department?u.department+' · ':''}{u.employee_id}</div></div></div>)}{!fUsers.length&&<div className="empty">검색 결과 없음</div>}</div></div></div>}if(dLd)return es(itemAvg).filter(function(x){return x.cat===cat}).sort(function(a,b){return a.order-b.order});if(!items.length)return null;return<div key={cat} className="card"><div className="card-t">{cat}</div><table className="tbl"><thead><tr><th>평가항목</th><th>동료 평균</th><th>본인</th><th>갭</th><th>평가수</th></tr></thead><tbody>{items.map(function(it){var avg=it.total/it.sc.length;var sf=itemSelf[it.cat+'|'+it.item];var gap=sf!=null?sf-avg:null;return<tr key={it.item}><td style={{fontWeight:700}}>{it.item}</td><td><div style={{display:'flex',alignItems:'center',gap:8}}><div style={{flex:1,height:8,background:'var(--line2)',borderRadius:4,overflow:'hidden'}}><div style={{width:(avg/5*100)+'%',height:'100%',background:'linear-gradient(90deg,var(--pr),var(--acc))',borderRadius:4}}></div></div><strong style={{color:'var(--pr)',fontSize:14}}>{avg.toFixed(1)}</strong></div></td><td style={{fontWeight:700}}>{sf!=null?sf:'-'}</td><td>{gap!=null?<span style={{fontWeight:700,color:gap>0?'var(--r)':gap<0?'var(--g)':'var(--ink6)'}}>{gap>0?'+':''}{gap.toFixed(1)}</span>:'-'}</td><td style={{color:'var(--ink5)'}}>{it.sc.length}명</td></tr>})}</tbody></table></div>})}{rcvFb.length>0&&<div className="card"><div className="card-t">💬 동료 피드백 (익명)</div>{rcvFb.map(function(f,i){return<div key={i} style={{padding:'12px 14px',background:'var(--line2)',borderRadius:10,marginBottom:8}}>{f.strengths&&<div style={{fontSize:13,marginBottom:4}}><span style={{color:'var(--g)',fontWeight:700}}>잘한 점:</span> {f.strengths}</div>}{f.improvements&&<div style={{fontSize:13}}><span style={{color:'var(--r)',fontWeight:700}}>개선할 점:</span> {f.improvements}</div>}</div>})}</div>}</div>}</div>}</div>;}
function App(){const[user,setUser]=useState(null);const[screen,setScreen]=useState('login');const[day,setDay]=useState(null);const[settings,setSettings]=useState([]);const[toast,setToast]=useState(null);const showToast=(m,t='success')=>setToast({message:m,type:t});const loadS=async()=>{try{setSettings(await Q('eval_settings','*'));}catch{}};useEffect(()=>{if(user)loadS();},[user]);const anyRO=settings.some(function(s){return s.result_open});if(screen==='login')return<><Login onLogin={u=>{setUser(u);setScreen(u.is_admin?'admin':'daySelect');}}/>{toast&&<Toast{...toast}onClose={()=>setToast(null)}/>}</>;return<div><div className="topbar"><h1><span style={{fontWeight:800}}>대웅그룹</span><span>Peer Evaluation</span></h1><div className="topbar-r"><span className="chip">{user.is_admin?'관리자':`${user.name} (${user.employee_id})`}</span>{!user.is_admin&&anyRO&&screen!=='result'&&<button className="topbar-btn" style={{background:'var(--pr-ll)',color:'var(--pr-d)'}} onClick={()=>setScreen('result')}>📋 내 결과</button>}{!user.is_admin&&screen==='result'&&<button className="topbar-btn" onClick={()=>setScreen('daySelect')}>평가하기</button>}{user.is_admin&&screen!=='admin'&&<button className="topbar-btn" onClick={()=>setScreen('admin')}>관리자</button>}<button className="topbar-btn" onClick={()=>{setUser(null);setScreen('login');setDay(null);}}>로그아웃</button></div></div>{screen==='admin'&&<Admin user={user} toast={showToast}/>}{screen==='daySelect'&&<DaySel settings={settings} onPick={d=>{setDay(d);setScreen('eval');}} onResult={()=>setScreen('result')}/>}{screen==='eval'&&<Eval user={user} day={day} onBack={()=>{setScreen('daySelect');setDay(null);loadS();}} toast={showToast}/>}{screen==='result'&&<MyResult user={user} settings={settings}/>}{toast&&<Toast{...toast}onClose={()=>setToast(null)}/>}</div>;}
ReactDOM.render(<App/>,document.getElementById('root'));

</script>
